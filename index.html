<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #5c94fc; 
            font-family: 'Courier New', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; touch-action: none; 
            user-select: none; -webkit-user-select: none; 
            box-sizing: border-box;
            overscroll-behavior: none;
        }
        
        #topWrapper { display: flex; flex-direction: column; width: 95%; max-width: 500px; margin-bottom: 5px; position: relative; z-index: 10; gap: 5px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        #uiPanel { color: white; font-size: 18px; font-weight: bold; text-shadow: 1px 1px #000; }
        #settingsBtn { background: rgba(0, 0, 0, 0.4); border: 2px solid #fff; border-radius: 50%; color: white; font-size: 20px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #settingsBtn:active { transform: scale(0.9); }
        
        .modal-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999; border-radius: 4px; }
        .menu-title { color: #ffcc00; font-size: 20px; font-weight: bold; margin-bottom: 15px; text-align: center; width: 90%; text-shadow: 1px 1px #000; }
        .menu-btn { width: 180px; height: 38px; background: #ffcc00; color: #000; font-size: 13px; margin: 5px; box-shadow: 0px 3px 0px #000; border: 3px solid #000; border-radius: 8px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
        .menu-btn:active { transform: translateY(3px); box-shadow: 0px 0px 0px #000; }
        .close-btn { width: 110px; height: 35px; background: #ff4545; color: white; font-size: 12px; margin-top: 15px; box-shadow: 0px 3px 0px #000; border: 3px solid #000; border-radius: 8px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
        .close-btn:active { transform: translateY(3px); box-shadow: 0px 0px 0px #000; }
        
        .volume-container { display: flex; flex-direction: column; align-items: center; margin: 6px 0; width: 85%; color: white; font-weight: bold; font-size: 13px; }
        .volume-slider { width: 100%; margin-top: 5px; cursor: pointer; accent-color: #ffcc00; }

        .about-text { color: #fff; font-size: 14px; text-align: center; line-height: 1.6; width: 85%; margin-bottom: 10px; }

        .lang-list { 
            display: flex; flex-direction: column; align-items: center; 
            max-height: 140px; overflow-y: scroll; width: 85%; padding: 5px; 
            border: 2px dashed #ffcc00; border-radius: 6px; background: rgba(255,255,255,0.05);
            touch-action: pan-y;
        }
        .lang-list::-webkit-scrollbar { width: 8px; }
        .lang-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        .lang-list::-webkit-scrollbar-thumb { background: #ffcc00; border-radius: 4px; border: 1px solid #000; }

        #gameCanvas { background-color: #5c94fc; border: 4px solid #000; width: 95%; max-width: 500px; aspect-ratio: 4/3; position: relative; box-sizing: border-box; }
        
        button { border: 4px solid #000; border-radius: 12px; color: white; font-weight: bold; touch-action: none; cursor: pointer; }
        .ctrl-btn { width: 65px; height: 65px; font-size: 24px; background: #ff4545; box-shadow: 0px 4px 0px #000; }
        .ctrl-btn:active { transform: translateY(4px); box-shadow: 0px 0px 0px #000; }
        
        #jumpBtn { background: #ffcc00; width: 75px; height: 75px; font-size: 28px; }
        
        /* GÜNCELLENDİ: Start ve Pause tuşlarının konumu aşağıya taşındı */
        .action-group { display: flex; width: 95%; max-width: 500px; gap: 10px; margin-top: 30px; margin-bottom: 20px; z-index: 10; }
        #startBtn { flex: 2; height: 38px; background: #4cd137; font-size: 14px; box-shadow: 0px 4px 0px #000; }
        #startBtn:active { transform: translateY(4px); box-shadow: 0px 0px 0px #000; }
        #pauseBtn { flex: 1; height: 38px; background: #ea2027; font-size: 14px; box-shadow: 0px 4px 0px #000; }
        #pauseBtn:active { transform: translateY(4px); box-shadow: 0px 0px 0px #000; }
        
        .download-container { width: 100%; text-decoration: none; display: block; }
        .download-button { width: 100%; height: 34px; background: #00a8ff; font-size: 12px; box-shadow: 0px 3px 0px #000; display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 8px; }
        .download-button:active { transform: translateY(3px); box-shadow: 0px 3px 0px #000; }

        #controlWrapper { display: flex; width: 95%; max-width: 500px; justify-content: space-between; margin-top: 10px; align-items: center; }
        .move-group { display: flex; gap: 10px; }

        @media (orientation: landscape) {
            body { padding: 5px; justify-content: flex-start; }
            #topWrapper { max-width: 420px; margin-bottom: 2px; }
            #gameCanvas { height: 62vh; width: auto; aspect-ratio: 4/3; max-width: none; }
            
            /* Landscape modunda butonlar yine sağ üstte kalsın */
            .action-group { position: fixed; top: 10px; right: 10px; width: 180px; margin-top: 0; margin-bottom: 0; }
            #startBtn, #pauseBtn { height: 34px; font-size: 11px; }
            #settingsBtn { position: fixed; top: 10px; left: 10px; }
            
            #controlWrapper {
                position: fixed;
                left: 0; right: 0; bottom: 10px;
                width: 100%; max-width: none;
                padding: 0 30px;
                box-sizing: border-box;
                pointer-events: none; 
            }
            .move-group, #jumpBtn { pointer-events: auto; } 
            .ctrl-btn { width: 70px; height: 70px; font-size: 26px; }
            #jumpBtn { width: 80px; height: 80px; font-size: 30px; }
        }
    </style>
</head>
<body>

    <div id="topWrapper">
        <div class="top-row">
            <div id="uiPanel"><span id="lbl-level">LEVEL</span>: <span id="level">1</span> | <span id="lbl-gold">GOLD</span>: <span id="score">0</span></div>
            <div id="settingsBtn" onclick="openMainMenu()">⚙️</div>
        </div>
        <a href="Game.apk" download class="download-container" id="dl-link">
            <button class="download-button" id="dl-btn">📥 DOWNLOAD / UPDATE APK</button>
        </a>
    </div>

    <div style="position: relative; display: flex; justify-content: center; width: 100%; align-items: center;">
        
        <div id="settingsMenu" class="modal-menu">
            <div class="menu-title" id="lbl-settings">SETTINGS / AYARLAR</div>
            
            <div class="volume-container">
                <span id="lbl-music-volume">MUSIC / MÜZİK: 100%</span>
                <input type="range" id="musicSlider" class="volume-slider" min="0" max="1" step="0.05" value="0.4">
            </div>

            <div class="volume-container">
                <span id="lbl-sfx-volume">SFX / EFEKT: 100%</span>
                <input type="range" id="sfxSlider" class="volume-slider" min="0" max="1" step="0.05" value="0.6">
            </div>

            <button class="menu-btn" id="lbl-lang-btn" onclick="openLangMenu()">🌐 LANGUAGE / DİL</button>
            <button class="menu-btn" id="lbl-about-btn" onclick="openAboutMenu()">ℹ️ ABOUT / HAKKINDA</button>
            <button class="close-btn" onclick="closeMenus()" id="lbl-close">CLOSE</button>
        </div>

        <div id="langMenu" class="modal-menu">
            <div class="menu-title" id="lbl-lang-title">SELECT LANGUAGE</div>
            <div class="lang-list">
                <button class="menu-btn" onclick="changeLanguage('tr')">TÜRKÇE</button>
                <button class="menu-btn" onclick="changeLanguage('en')">ENGLISH</button>
                <button class="menu-btn" onclick="changeLanguage('de')">DEUTSCH</button>
                <button class="menu-btn" onclick="changeLanguage('it')">ITALIANO</button>
                <button class="menu-btn" onclick="changeLanguage('pt')">PORTUGUÊS</button>
                <button class="menu-btn" onclick="changeLanguage('es')">ESPAÑOL</button>
                <button class="menu-btn" onclick="changeLanguage('fr')">FRANÇAIS</button>
                <button class="menu-btn" onclick="changeLanguage('ja')">日本語</button>
                <button class="menu-btn" onclick="changeLanguage('ru')">РУССКИЙ</button>
                <button class="menu-btn" onclick="changeLanguage('fa')">فارسی</button>
                <button class="menu-btn" onclick="changeLanguage('zh')">中文</button>
                <button class="menu-btn" onclick="changeLanguage('ar')">العربية</button>
            </div>
            <button class="close-btn" onclick="backToMainMenu()" id="lbl-back">BACK / GERİ</button>
        </div>

        <div id="aboutMenu" class="modal-menu">
            <div class="menu-title" id="lbl-about-title">ABOUT / HAKKINDA</div>
            <div class="about-text" id="aboutText">
                <strong>Game</strong><br>
                Version / Sürüm: 6.0
            </div>
            <button class="close-btn" onclick="backToMainMenu()" id="lbl-about-back">BACK / GERİ</button>
        </div>

        <canvas id="gameCanvas" width="400" height="300"></canvas>
    </div>
    
    <div id="controlWrapper">
        <div class="move-group">
            <button id="leftBtn" class="ctrl-btn">◀</button>
            <button id="rightBtn" class="ctrl-btn">▶</button>
        </div>
        <button id="jumpBtn" class="ctrl-btn">▲</button>
    </div>

    <div class="action-group">
        <button id="startBtn">START / RESET</button>
        <button id="pauseBtn">PAUSE</button>
    </div>

    <script>
        // -- GLOBAL STATE --
        window.crouchState = { isCrouching: false };

        const dictionary = {
            tr: { level: "SEVİYE", gold: "ALTIN", settings: "AYARLAR", close: "KAPAT", langBtn: "🌐 DİL SEÇİMİ", langTitle: "DİL SEÇİNİZ", back: "GERİ", download: "📥 APK İNDİR / GÜNCELLE", gameover: "OYUN BİTTİ", win: "TEBRİKLER! TÜM BÖLÜMLERİ GEÇTİN!", mVol: "MÜZİK SESİ", sVol: "EFEKT SESİ", aboutBtn: "ℹ️ HAKKINDA", aboutTitle: "HAKKINDA", aboutText: "<strong>Game</strong><br>Sürüm: 6.0", pause: "DURDUR", resume: "DEVAM ET", rtl: false },
            en: { level: "LEVEL", gold: "GOLD", settings: "SETTINGS", close: "CLOSE", langBtn: "🌐 LANGUAGE", langTitle: "SELECT LANGUAGE", back: "BACK", download: "📥 DOWNLOAD / UPDATE APK", gameover: "GAME OVER", win: "YOU WIN ALL LEVELS!", mVol: "MUSIC VOLUME", sVol: "SFX VOLUME", aboutBtn: "ℹ️ ABOUT", aboutTitle: "ABOUT", aboutText: "<strong>Game</strong><br>Version: 6.0", pause: "PAUSE", resume: "RESUME", rtl: false },
            de: { level: "STUFE", gold: "GOLD", settings: "EINSTELLUNGEN", close: "SCHLIESSEN", langBtn: "🌐 SPRACHE", langTitle: "SPRACHE WÄHLEN", back: "ZURÜCK", download: "📥 APK HERUNTERLADEN / AKTUALISIEREN", gameover: "SPIEL VORBEI", win: "ALLE STUFEN GEWONNEN!", mVol: "MUSIKLAUTSTÄRKE", sVol: "EFFEKTLAUTSTÄRKE", aboutBtn: "ℹ️ ÜBER SPIEL", aboutTitle: "ÜBER SPIEL", aboutText: "<strong>Game</strong><br>Version: 6.0", pause: "PAUSE", resume: "WEITER", rtl: false },
            it: { level: "LIVELLO", gold: "ORO", settings: "IMPOSTAZIONI", close: "CHIUDI", langBtn: "🌐 LINGUA", langTitle: "SCEGLI LINGUA", back: "INDIETRO", download: "📥 SCARICA / AGGIORNA APK", gameover: "GAME OVER", win: "HAI VINTO TUTTI I LIVELLI!", mVol: "VOLUME MUSICA", sVol: "VOLUME EFFETTI", aboutBtn: "ℹ️ INFO", aboutTitle: "INFO", aboutText: "<strong>Game</strong><br>Versione: 6.0", pause: "PAUSA", resume: "RIPRENDI", rtl: false },
            pt: { level: "NÍVEL", gold: "OURO", settings: "OPÇÕES", close: "FECHAR", langBtn: "🌐 IDIOMA", langTitle: "SELECIONAR IDIOMA", back: "VOLTAR", download: "📥 BAIXAR / ATUALIZAR APK", gameover: "FIM DE JOGO", win: "VOCÊ VENCEU TODOS OS NÍVEIS!", mVol: "VOLUME DA MÚSICA", sVol: "VOLUME DOS EFEITOS", aboutBtn: "ℹ️ SOBRE", aboutTitle: "SOBRE", aboutText: "<strong>Game</strong><br>Versão: 6.0", pause: "PAUSAR", resume: "CONTINUAR", rtl: false },
            es: { level: "NIVEL", gold: "ORO", settings: "AJUSTES", close: "CERRAR", langBtn: "🌐 IDIOMA", langTitle: "SELECONAR IDIOMA", back: "ATRÁS", download: "📥 DESCARGAR / ACTUALIZAR APK", gameover: "JUEGO TERMINADO", win: "¡GANASTE TODOS LOS NIVELLES!", mVol: "VOLUMEN MÚSICA", sVol: "VOLUMEN EFECTOS", aboutBtn: "ℹ️ ACERCA DE", aboutTitle: "ACERCA DE", aboutText: "<strong>Game</strong><br>Versión: 6.0", pause: "PAUSA", resume: "REANUDAR", rtl: false },
            fr: { level: "NIVEAU", gold: "OR", settings: "RÉGLAGES", close: "FERMER", langBtn: "🌐 LANGUE", langTitle: "CHOISIR LA LANGUE", back: "RETOUR", download: "📥 TÉLÉCHARGER / METTRE À JOUR APK", gameover: "FIN DE JEU", win: "VOUS AVEZ GAGNÉ TOUS LES NIVEAUX!", mVol: "VOLUME MUSIQUE", sVol: "VOLUME EFFETS", aboutBtn: "ℹ️ À PROPOS", aboutTitle: "À PROPOS", aboutText: "<strong>Game</strong><br>Version: 6.0", pause: "PAUSE", resume: "REPRENDRE", rtl: false },
            ja: { level: "レベル", gold: "ゴールド", settings: "設定", close: "閉じる", langBtn: "🌐 言語選択", langTitle: "言語を選択してください", back: "戻る", download: "📥 APK ダウンロード / アップデート", gameover: "ゲームオーバー", win: "すべてのレベル teba をクリアしました！", mVol: "BGM音量", sVol: "SE音量", aboutBtn: "ℹ️ 情報", aboutTitle: "情報", aboutText: "<strong>Game</strong><br>バージョン: 6.0", pause: "一时停止", resume: "再開", rtl: false },
            ru: { level: "УРОВЕНЬ", gold: "ЗОЛОТО", settings: "НАСТРОЙКИ", close: "ЗАКРЫТЬ", langBtn: "🌐 ЯЗЫК", langTitle: "ВЫБЕРИТЕ ЯЗЫК", back: "НАЗАД", download: "📥 СКАЧАТЬ / ОБНОВИТЬ APK", gameover: "ИГРА ОКОНЧЕНА", win: "ВЫ ВЫИГРАЛИ ВСЕ УРОВНИ!", mVol: "ГРОМКОСТЬ БГМ", sVol: "ГРОМКОСТЬ ЗВУКОВ", aboutBtn: "ℹ️ О ПРОГРАММЕ", aboutTitle: "О ПРОГРАММЕ", aboutText: "<strong>Game</strong><br>Версия: 6.0", pause: "ПАУЗА", resume: "ПРОДОЛЖИТЬ", rtl: false },
            fa: { level: "مرحله", gold: "طلا", settings: "تنظیمات", close: "بستن", langBtn: "🌐 انتخاب زبان", langTitle: "زبان خود را انتخاب کنید", back: "بازگشت", download: "📥 دانلود / بروزرسانی برنامه", gameover: "بازی تمام شد", win: "شما برنده تمام مراحل شدید!", mVol: "حجم صدای موزیک", sVol: "حجم صدای جلوه ها", aboutBtn: "ℹ️ درباره بازی", aboutTitle: "درباره بازی", aboutText: "<strong>Game</strong><br>نسخه: 6.0", pause: "توقف", resume: "ادامه", rtl: true },
            zh: { level: "关卡", gold: "金币", settings: "设置", close: "关闭", langBtn: "🌐 语言", langTitle: "选择语言", back: "返回", download: "📥 下载 / 更新 APK", gameover: "游戏结束", win: "你赢了所有关卡！", mVol: "音乐音量", sVol: "音效音量", aboutBtn: "ℹ️ 关于", aboutTitle: "关于", aboutText: "<strong>Game</strong><br>版本: 6.0", pause: "暂停", resume: "继续", rtl: false },
            ar: { level: "المستوى", gold: "الذهب", settings: "الإعدادات", close: "إغلاق", langBtn: "🌐 اللغة", langTitle: "اختر اللغة", back: "عودة", download: "📥 تنزيل / تحديث APK", gameover: "لعبة انتهت", win: "لقد فزت بجميع المستويات!", mVol: "صوت الموسيقى", sVol: "صوت المؤثرات", aboutBtn: "ℹ️ حول", aboutTitle: "حول", aboutText: "<strong>Game</strong><br>الإصدار: 6.0", pause: "إيقاف", resume: "استئناف", rtl: true }
        };

        let currentLang = localStorage.getItem("altay_lang") || "en";
        let musicVolume = parseFloat(localStorage.getItem("altay_music_vol") ?? "0.3");
        let sfxVolume = parseFloat(localStorage.getItem("altay_sfx_vol") ?? "0.5");

        function openMainMenu() { 
            triggerAutoPause();
            document.getElementById("settingsMenu").style.display = "flex"; 
            document.getElementById("langMenu").style.display = "none"; 
            document.getElementById("aboutMenu").style.display = "none"; 
        }
        function openLangMenu() { 
            triggerAutoPause();
            document.getElementById("settingsMenu").style.display = "none"; 
            document.getElementById("langMenu").style.display = "flex"; 
        }
        function openAboutMenu() { 
            triggerAutoPause();
            document.getElementById("settingsMenu").style.display = "none"; 
            document.getElementById("aboutMenu").style.display = "flex"; 
        }
        function backToMainMenu() { document.getElementById("langMenu").style.display = "none"; document.getElementById("aboutMenu").style.display = "none"; document.getElementById("settingsMenu").style.display = "flex"; }
        
        function closeMenus() { 
            document.getElementById("settingsMenu").style.display = "none"; 
            document.getElementById("langMenu").style.display = "none"; 
            document.getElementById("aboutMenu").style.display = "none"; 
            
            if(gameState === "paused") {
                gameState = "play";
                document.getElementById("pauseBtn").innerText = dictionary[currentLang].pause;
                lastTime = performance.now();
                if(audioCtx && !document.hidden) {
                    audioCtx.resume();
                    nextMusicNoteTime = audioCtx.currentTime;
                }
            }
        }
        function changeLanguage(lang) { currentLang = lang; localStorage.setItem("altay_lang", lang); applyLanguage(); backToMainMenu(); }
        
        const mSlider = document.getElementById("musicSlider");
        const sSlider = document.getElementById("sfxSlider");
        mSlider.value = musicVolume;
        sSlider.value = sfxVolume;

        mSlider.addEventListener("input", (e) => {
            musicVolume = parseFloat(e.target.value);
            localStorage.setItem("altay_music_vol", musicVolume);
            if (musicGainNode) musicGainNode.gain.setValueAtTime(musicVolume * 0.15, audioCtx.currentTime);
            updateVolumeLabels();
        });

        sSlider.addEventListener("input", (e) => {
            sfxVolume = parseFloat(e.target.value);
            localStorage.setItem("altay_sfx_vol", sfxVolume);
            updateVolumeLabels();
        });

        function updateVolumeLabels() {
            document.getElementById("lbl-music-volume").innerText = `${dictionary[currentLang].mVol}: ${Math.round(musicVolume * 100)}%`;
            document.getElementById("lbl-sfx-volume").innerText = `${dictionary[currentLang].sVol}: ${Math.round(sfxVolume * 100)}%`;
        }

        function applyLanguage() {
            const langData = dictionary[currentLang];
            if(langData.rtl) {
                document.getElementById("topWrapper").style.flexDirection = "column";
                document.querySelector(".top-row").style.flexDirection = "row-reverse";
                document.getElementById("uiPanel").style.direction = "rtl";
            } else {
                document.getElementById("topWrapper").style.flexDirection = "column";
                document.querySelector(".top-row").style.flexDirection = "row";
                document.getElementById("uiPanel").style.direction = "ltr";
            }
            document.getElementById("lbl-level").innerText = langData.level;
            document.getElementById("lbl-gold").innerText = langData.gold;
            document.getElementById("lbl-settings").innerText = langData.settings;
            document.getElementById("lbl-close").innerText = langData.close;
            document.getElementById("lbl-lang-btn").innerText = langData.langBtn;
            document.getElementById("lbl-lang-title").innerText = langData.langTitle;
            document.getElementById("lbl-back").innerText = langData.back;
            document.getElementById("lbl-about-back").innerText = langData.back;
            document.getElementById("dl-btn").innerText = langData.download;
            document.getElementById("lbl-about-btn").innerText = langData.aboutBtn;
            document.getElementById("lbl-about-title").innerText = langData.aboutTitle;
            document.getElementById("aboutText").innerHTML = langData.aboutText;
            
            const pBtn = document.getElementById("pauseBtn");
            if(gameState === "paused") pBtn.innerText = langData.resume;
            else pBtn.innerText = langData.pause;

            updateVolumeLabels();
        }

        let audioCtx = null;
        let musicGainNode = null;
        let nextMusicNoteTime = 0;
        let musicStep = 0;
        const melody = [261.63, 293.66, 329.63, 392.00, 329.63, 293.66, 261.63, 349.23];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicGainNode = audioCtx.createGain();
                musicGainNode.gain.setValueAtTime(musicVolume * 0.15, audioCtx.currentTime);
                musicGainNode.connect(audioCtx.destination);
                nextMusicNoteTime = audioCtx.currentTime;
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function tickBackgroundMusic() {
            if (!audioCtx || gameState !== "play" || musicVolume === 0 || document.hidden) return;

            const now = audioCtx.currentTime;
            while (nextMusicNoteTime < now + 0.1) {
                const osc = audioCtx.createOscillator();
                const noteGain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(melody[musicStep % melody.length], nextMusicNoteTime);
                
                noteGain.gain.setValueAtTime(0.4, nextMusicNoteTime);
                noteGain.gain.exponentialRampToValueAtTime(0.001, nextMusicNoteTime + 0.35);
                
                osc.connect(noteGain);
                noteGain.connect(musicGainNode);
                
                osc.start(nextMusicNoteTime);
                osc.stop(nextMusicNoteTime + 0.4);
                
                nextMusicNoteTime += 0.4;
                musicStep++;
            }
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                if (audioCtx && audioCtx.state === 'running') {
                    audioCtx.suspend();
                }
            } else {
                if (audioCtx && gameState === "play") {
                    audioCtx.resume();
                    nextMusicNoteTime = audioCtx.currentTime;
                }
            }
        });

        function playOriginalFinishSound() {
            initAudio(); if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const victoryNotes = [
                { f: 523.25, d: 0.10 }, { f: 659.25, d: 0.10 }, { f: 783.99, d: 0.10 },
                { f: 1046.50, d: 0.15 }, { f: 783.99, d: 0.10 }, { f: 1046.50, d: 0.40 }
            ];
            let currentDelay = 0;

        });
        window.addEventListener("keyup", (e) => {
            if(e.key === "ArrowLeft" || e.key === "a") keys.l = false;
            if(e.key === "ArrowRight" || e.key === "d") keys.r = false;
        });

        function update(timestamp) {
            let deltaTime = 1;
            if (timestamp) {
                deltaTime = (timestamp - lastTime) / 16.67;
                lastTime = timestamp;
            }

            if(gameState === "play") {
                tickBackgroundMusic();

                if (player.invuln > 0) player.invuln -= deltaTime;

                let currentSpeed = isGrounded ? 3.5 : 4.1;
                if(keys.l) player.vx = -currentSpeed * deltaTime; 
                else if(keys.r) player.vx = currentSpeed * deltaTime; 
                else player.vx *= Math.pow(0.82, deltaTime);
                
                player.vy += 0.35 * deltaTime; 
                
                player.x += player.vx;
                if(player.x < 0) player.x = 0;
                
                let current = levels[level-1];
                
                let mp = current.movingPlat;
                let oldMpX = mp.x;
                mp.x += mp.dir * deltaTime;
                if(mp.x > mp.endX || mp.x < mp.startX) mp.dir *= -1;
                let mpSpeedX = mp.x - oldMpX; 

                current.plats.forEach(p => {
                    if(player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y + 2 && player.y < p.y + p.h) {
                        if(player.vx > 0 && player.x + player.w - player.vx <= p.x + 2) player.x = p.x - player.w;
                        if(player.vx < 0 && player.x - player.vx >= p.x + p.w - 2) player.x = p.x + p.w;
                    }
                });

                if(player.x + player.w > mp.x && player.x < mp.x + mp.w && player.y + player.h > mp.y + 2 && player.y < mp.y + mp.h) {
                    if(player.vx > 0 && player.x + player.w - player.vx <= mp.x + 2) player.x = mp.x - player.w;
                    if(player.vx < 0 && player.x - player.vx >= mp.x + mp.w - 2) player.x = mp.x + mp.w;
                }

                player.y += player.vy;
                let onPlatform = false;

                current.plats.forEach(p => { 
                    if(player.x + player.w - 2 > p.x && player.x + 2 < p.x + p.w) {
                        if(player.y + player.h >= p.y && player.y + player.h <= p.y + player.vy + 4 && player.vy >= 0) { 
                            player.vy = 0; player.y = p.y - player.h; onPlatform = true;
                        }
                    }
                });

                if(player.x + player.w - 2 > mp.x && player.x + 2 < mp.x + mp.w) {
                    if(player.y + player.h >= mp.y && player.y + player.h <= mp.y + player.vy + 4 && player.vy >= 0) {
                        player.vy = 0;
                        player.y = mp.y - player.h;
                        player.x += mpSpeedX; 
                        onPlatform = true;
                    }
                }
                
                isGrounded = onPlatform;

                cameraX = player.x - 100;
                if(cameraX < 0) cameraX = 0;
                if(cameraX > mapWidth - 400) cameraX = mapWidth - 400;

                current.enemies.forEach(e => { 
                    let speedMultiplier = e.type === "fast" ? (1 + (level * 0.04)) : 1.0;
                    e.x += e.dir * speedMultiplier * deltaTime; 
                    if(e.x > e.end || e.x < e.start) e.dir *= -1; 
                    if(player.x + player.w > e.x + 2 && player.x < e.x + 13 && player.y + player.h > e.y + 2 && player.y < e.y + 13) { 
                        if (player.invuln <= 0) {
                            if (player.isBig) {
                                player.isBig = false;
                                if (window.crouchState && window.crouchState.isCrouching) {
                                    window.crouchState.isCrouching = false;
                                } else {
                                    player.h = 24;
                                    player.y += 24; 
                                }
                                player.invuln = 60; 
                                playSound('jump'); 
                            } else {
                                playSound('die'); 
                                loadLevel(true); 
                            }
                        }
                    }
                });

                current.coins.forEach((c, index) => {
                    if(Math.abs(player.x - c.x) < 18 && Math.abs(player.y - c.y) < (player.isBig ? 34 : 22)) { current.coins.splice(index, 1); score++; document.getElementById("score").innerText = score; playSound('coin'); }
                });

                if (current.growSquares) {
                    current.growSquares.forEach((g, index) => {
                        if(Math.abs(player.x - g.x) < 18 && Math.abs(player.y - g.y) < (player.isBig ? 34 : 22)) { current.growSquares.splice(index, 1); playSound('coin'); if (!player.isBig) { player.isBig = true; player.h = 48; player.y -= 24; } }
                    });
                }

                current.checkpoints.forEach(cp => {
                    if (!cp.active && player.x + player.w >= cp.x && player.x <= cp.x + 15 && player.y + player.h >= cp.y - 30 && player.y <= cp.y) {
                        cp.active = true; playCheckpointSound();
                    }
                });

                let f = current.finish;
                if(player.x < f.x + f.w && player.x + player.w > f.x && player.y < f.y + f.h && player.y + player.h > f.y) {
                    playOriginalFinishSound();
                    if(level < levels.length) { level++; loadLevel(false); } else { gameState = "win"; }
                }
                
                if(player.y > 285) { playSound('die'); loadLevel(true); }
            }
            draw(); requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0,0,400,300);
            ctx.save(); ctx.translate(-cameraX, 0);
            let current = levels[level-1];
            
            ctx.fillStyle = "#A0522D"; 
            current.plats.forEach(p => {
                ctx.beginPath();
                ctx.moveTo(p.x + 8, p.y + p.h);      
                ctx.lineTo(p.x + p.w - 8, p.y + p.h); 
                ctx.lineTo(p.x + p.w / 2, p.y + 160); 
                ctx.closePath();
                ctx.fill();
            });

            ctx.fillStyle = "#8B5A2B"; 
            current.plats.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            ctx.fillStyle = "#34495e";
            let mp = current.movingPlat;
            ctx.fillRect(mp.x, mp.y, mp.w, mp.h);

            current.enemies.forEach(e => {
                ctx.fillStyle = e.type === "fast" ? "#9b59b6" : "red"; 
                ctx.fillRect(e.x, e.y, 15, 15);
            });
            
            ctx.fillStyle = "gold"; current.coins.forEach(c => ctx.fillRect(c.x, c.y, 10, 10));

            if (current.growSquares) {
                ctx.fillStyle = "lime"; current.growSquares.forEach(g => ctx.fillRect(g.x, g.y, 10, 10));
            }
            
            current.checkpoints.forEach(cp => {
                ctx.fillStyle = "#ffffff"; ctx.fillRect(cp.x, cp.y - 30, 3, 30);
                ctx.fillStyle = cp.active ? "#4cd137" : "#ffcc00";
                ctx.beginPath(); ctx.moveTo(cp.x + 3, cp.y - 30); ctx.lineTo(cp.x + 18, cp.y - 22); ctx.lineTo(cp.x + 3, cp.y - 14); ctx.fill();
            });

            ctx.fillStyle = "yellow"; ctx.fillRect(current.finish.x, current.finish.y, current.finish.w, current.finish.h);
            
            if (player.invuln > 0 && Math.floor(player.invuln / 4) % 2 === 0) {
                // Flash effect
            } else {
                ctx.fillStyle = "blue"; ctx.fillRect(player.x, player.y, player.w, player.h);
            }
            
            ctx.restore();
            
            ctx.fillStyle = "white"; ctx.font = "bold 18px 'Courier New'"; ctx.textAlign = "center";
            if(gameState === "over") ctx.fillText(dictionary[currentLang].gameover, 200, 150);
            if(gameState === "win") ctx.fillText(dictionary[currentLang].win, 200, 150);
            if(gameState === "paused") {
                ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0,0,400,300);
                ctx.fillStyle = "white"; ctx.font = "bold 24px 'Courier New'"; ctx.fillText("PAUSED", 200, 150);
            }
            document.getElementById("level").innerText = level;
        }

        function triggerAutoPause() {
            if (gameState === "play") {
                gameState = "paused";
                document.getElementById("pauseBtn").innerText = dictionary[currentLang].resume;
                if (audioCtx) audioCtx.suspend();
            }
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                triggerAutoPause();
            }
        });

        window.addEventListener("blur", () => {
            triggerAutoPause();
        });

        loadLevel(false);
        applyLanguage();
        requestAnimationFrame(update);
    </script>

    <style>
        #crouchBtn {
            background: #555555;
            box-shadow: 0px 4px 0px #000;
        }
        #crouchBtn:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px #000;
        }
        @media (orientation: landscape) {
            #controlWrapper { pointer-events: none; }
            .move-group { pointer-events: auto; display: flex; align-items: center; gap: 10px; }
            #crouchBtn { width: 70px; height: 70px; font-size: 26px; }
        }
    </style>

    <script>
        (function() {
            const moveGroup = document.querySelector('.move-group');
            if (moveGroup) {
                const crouchBtn = document.createElement('button');
                crouchBtn.id = 'crouchBtn';
                crouchBtn.className = 'ctrl-btn';
                crouchBtn.innerText = '▼';
                moveGroup.appendChild(crouchBtn);

                const startCrouch = (e) => {
                    if (e) e.preventDefault();
                    if (typeof initAudio === 'function') initAudio();
                    if (gameState === 'play' && player.isBig) {
                        if (!window.crouchState.isCrouching) {
                            window.crouchState.isCrouching = true;
                            player.h = 24;      
                            player.y += 24;     
                        }
                    }
                };

                const endCrouch = (e) => {
                    if (e) e.preventDefault();
                    if (window.crouchState.isCrouching) {
                        let canStandUp = true;
                        let current = levels[level-1];
                        let simulatedY = player.y - 24;
                        
                        current.plats.forEach(p => {
                            if (player.x + player.w > p.x && player.x < p.x + p.w &&
                                simulatedY + 48 > p.y && simulatedY < p.y + p.h) {
                                canStandUp = false;
                            }
                        });
                        
                        let mp = current.movingPlat;
                        if (player.x + player.w > mp.x && player.x < mp.x + mp.w &&
                            simulatedY + 48 > mp.y && simulatedY < mp.y + mp.h) {
                            canStandUp = false;
                        }

                        if (canStandUp) {
                            window.crouchState.isCrouching = false;
                            player.h = 48;
                            player.y -= 24;
                        }
                    }
                };

                crouchBtn.addEventListener('touchstart', startCrouch, { passive: false });
                crouchBtn.addEventListener('touchend', endCrouch, { passive: false });
                crouchBtn.addEventListener('mousedown', startCrouch);
                crouchBtn.addEventListener('mouseup', endCrouch);
                crouchBtn.addEventListener('mouseleave', endCrouch);

                window.addEventListener('keydown', (e) => {
                    if (e.key === 'Control' || e.key === 's' || e.key === 'ArrowDown') startCrouch();
                });
                window.addEventListener('keyup', (e) => {
                    if (e.key === 'Control' || e.key === 's' || e.key === 'ArrowDown') endCrouch();
                });
            }

            if (typeof ctx !== 'undefined') {
                const originalFillRect = ctx.fillRect;
                ctx.fillRect = function(x, y, w, h) {
                    if (typeof player !== 'undefined' && 
                        Math.abs(w - player.w) < 0.1 && 
                        Math.abs(h - player.h) < 0.1 &&
                        Math.abs(x - player.x) < 2 &&
                        Math.abs(y - player.y) < 2) {
                        
                        if (window.crouchState.isCrouching) {
                            let oldStyle = ctx.fillStyle;
                            ctx.fillStyle = "darkblue";
                            originalFillRect.apply(this, arguments);
                            ctx.fillStyle = oldStyle;
                            return;
                        }
                    }
                    originalFillRect.apply(this, arguments);
                };
            }
        })();
    </script>
</body>
</html>
